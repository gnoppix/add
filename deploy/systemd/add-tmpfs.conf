# tmpfiles.d rule: mount /root/.add on tmpfs (RAM-only) at boot.
#
# Add Core Node daemons keep their DHT/relay state and any volatile key
# material under /root/.add. A persistent block device (ext4) would let an
# offline disk clone / hypervisor snapshot recover that material at rest. Mounting
# the dir on tmpfs means it lives only in RAM and is wiped on reboot/power-loss —
# exactly the snapshot-resistance the crypto::snapshot_defense module enforces.
#
# The daemons panic at boot (ADD_REQUIRE_TMPFS=1) unless this mount is
# actually tmpfs, so the two mechanisms reinforce each other.
#
# Format: type path mode uid gid age argument
#   v = tmpfs mount (created + mounted at boot, removed at shutdown)
v /root/.add 0700 root root - - tmpfs
