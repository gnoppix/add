<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 30px;
      text-align: center;
      background: #f5f5f5;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }
    h1 { margin: 10px 0; font-size: 24px; }
    p { margin: 10px 0; color: #333; }
    .link {
      color: #0066cc;
      cursor: pointer;
      text-decoration: underline;
    }
    .link:hover { color: #004499; }
    .thanks { text-align: left; margin-top: 20px; }
  </style>
</head>
<body>
  <img src="icon.png" alt="Gnoppix Add Messenger" class="logo" onerror="this.style.display='none'">
  <h1>Gnoppix Add Messenger</h1>
  <p>Version <span id="version"></span></p>
  <p>Secure P2P messaging with post-quantum cryptography.</p>
  <p>© 2002 - 2026 By Andreas Mueller - Gnoppix Linux</p>
  <p>Gnoppix Add Messenger is Open Source under <a href="#" id="license-link" class="link">BSL License</a></p>
  <div class="thanks">
    <p>Add's Special thanks to:</p>
    <ul style="text-align: left; margin-left: 30px;">
      <li>Werner Koch</li>
      <li>Ross Anderson</li>
    </ul>
  </div>
  <script>
    window.addAPI.getVersion().then(v => {
      document.getElementById('version').textContent = v
    })
    document.getElementById('license-link').addEventListener('click', (e) => {
      e.preventDefault()
      window.addAPI.openExternal('https://github.com/gnoppix/add/blob/main/LICENSE.md')
    })
  </script>
</body>
</html>
